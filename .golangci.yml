version: "2"

run:
  # Pin to the highest Go language version that current golangci-lint releases
  # are built against; the linter refuses a target newer than its own build.
  go: "1.25"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - revive
    - unconvert
    - unused
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

formatters:
  enable:
    - gofmt
    - goimports

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true
