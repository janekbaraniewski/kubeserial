# kind cluster configuration for kubeserial e2e tests.
#
# The single node is a Docker container; its /dev is what the device-monitor
# DaemonSet's `hostPath: /dev` mount surfaces into the monitor pod. The
# device-simulation harness (see test/e2e/helpers.go) creates /dev/<name> inside
# this node to mimic a plugged-in serial device.
#
# Used by: `make test-e2e` and .github/workflows/e2e.yml via helm/kind-action.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kubeserial-e2e
nodes:
  - role: control-plane
    # A single control-plane node also schedules workloads in kind by default
    # (the control-plane is not tainted NoSchedule in single-node clusters once
    # we tolerate it; the chart's DaemonSet/Deployments tolerate or the node is
    # untainted). If pods stay Pending, remove the control-plane taint with:
    #   kubectl taint nodes --all node-role.kubernetes.io/control-plane-
    extraMounts:
      # Optional: expose a host directory for local debugging of injected device
      # nodes. NOT required for Option B (in-cluster simulator pod), but handy
      # when iterating locally with `docker exec`.
      - hostPath: /tmp/kubeserial-e2e-dev
        containerPath: /tmp/kubeserial-e2e-dev
